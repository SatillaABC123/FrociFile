<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Froci File</title>
  <link rel="stylesheet" href="CSS/style.css" />
</head>
<body>
  <div class="noise"></div>

  <main class="screen">
    <p class="warning">Restricted Archive</p>
    <h1>I Froci File</h1>
    <p class="subtitle">Some files should stay buried.</p>

    <button id="openButton" class="open-btn">Open</button>
  </main>

  <div id="modalOne" class="modal hidden">
    <div class="modal-box">
      <h2>Are you sure?</h2>
      <p>Once opened, there is no turning back.</p>
      <div class="modal-actions">
        <button id="yesOne" class="btn danger">Yes</button>
        <button id="noOne" class="btn">No</button>
      </div>
    </div>
  </div>

  <div id="modalTwo" class="modal hidden">
    <div class="modal-box">
      <h2>Are you really sure?</h2>
      <p>The file may contain something you were never meant to see.</p>
      <div class="modal-actions">
        <button id="yesTwo" class="btn danger">Yes</button>
        <button id="noTwo" class="btn">No</button>
      </div>
    </div>
  </div>

  <audio id="globalBgMusic" class="global-bg-music" loop preload="auto">
    <source src="MEDIA/audio/bg-music.mp3" type="audio/mpeg" />
  </audio>

  <script src="JS/script.js"></script>
</body>
</html>
